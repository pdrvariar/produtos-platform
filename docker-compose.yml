version: '3.8'

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: produtos_frontend
    ports:
      - "3000:80"
    networks:
      - produtos_net

  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: produtos_app
    volumes:
      # Bind mount com cache (reduz sincronização em macOS/Windows)
      - ./backend:/var/www:delegated
      # Volumes anônimos para pastas que não precisam ser sincronizadas com o host
      - /var/www/vendor
      - /var/www/node_modules   # se houver frontend dentro do backend (ex: Laravel com Vite)
      - composer_cache:/root/.composer/cache
    environment:
      - PHP_OPCACHE_ENABLE=1
      - PHP_OPCACHE_REVALIDATE_FREQ=0   # em desenvolvimento, revalida arquivos a cada requisição (para não precisar reiniciar)
    depends_on:
      - mysql
      - redis
      - keycloak
    networks:
      - produtos_net

  nginx:
    image: nginx:latest
    container_name: produtos_nginx
    ports:
      - "8000:80"
    volumes:
      - ./backend:/var/www:cached
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:cached
    depends_on:
      - app
    networks:
      - produtos_net

  mysql:
    image: mysql:8
    container_name: produtos_mysql
    environment:
      MYSQL_DATABASE: produtos
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    command:
      - --innodb_buffer_pool_size=256M   # Aumenta cache do MySQL
      - --query_cache_type=0             # Desabilita query cache (obsoleto no MySQL 8)
    networks:
      - produtos_net

  redis:
    image: redis:alpine
    container_name: produtos_redis
    ports:
      - "6379:6379"
    networks:
      - produtos_net

  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: produtos_keycloak
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    command: start-dev
    ports:
      - "8080:8080"
    networks:
      - produtos_net

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: produtos_phpmyadmin
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
    ports:
      - "8081:80"
    depends_on:
      - mysql
    networks:
      - produtos_net

networks:
  produtos_net:
    driver: bridge

volumes:
  composer_cache:
    driver: local
