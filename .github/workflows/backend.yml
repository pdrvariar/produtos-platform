name: Backend CI - Treinamento TJ/PR COTI Informatica

# ==================================
# ON
# Eventos que executam a pipelines
# ==================================

on:
  push:
    branches:
      - master
    paths:
      - "backend/**"
  pull_request:
    branches:
      - master
    paths:
      - "backend/**"

# ==================================
# JOBS
# Tarefas executadas pela pipeline
# ==================================
jobs:

  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4
      
      - name: Configurar o PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.2

      - name: Instalar as dependęncias (Composer)
        run: composer install --no-interaction --prefer-dist

      - name: Copiar .env
        run: cp .env.example .env

      - name: Gerar chave da aplicaçăo
        run: php artisan key:generate

      - name: Build concluido
        run: echo "Build finalizado com sucesso!"

  test:
    runs-on: ubuntu-latest
    needs: build
    defaults:
      run:
        working-directory: backend
    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: produtos_test
        port:
          - 3306:3306
        options:
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4
        
      - name: Iniciando testes
        run: echo "Iniciando o processo de testes!"

  deploy:
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Iniciando implantaçăo
        run: echo "Iniciando a implantaçăo do projeto!"