name: Frontend CI - Treinamento TJ/PR COTI Informatica

# ==================================
# ON
# Eventos que executam a pipelines
# ==================================

on:
  push:
    branches:
      - master
    paths:
      - "frontend/**"
  pull_request:
    branches:
      - master
    paths:
      - "frontend/**"

# ==================================
# JOBS
# Tarefas executadas pela pipeline
# ==================================
jobs:

  build:
    runs-on: ubuntu-latest
    needs: build
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Compilando aplicańŃo
        run: echo "Iniciando o processo de compilańŃo!"

  deploy:
    runs-on: ubuntu-latest
    needs: build
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Iniciando implantańŃo
        run: echo "Iniciando a implantańŃo do projeto!"